<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Occupational Stress Sphere</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06070f;
      --surface:     #0c0e1a;
      --surface2:    #10132200;
      --border:      #1c2035;
      --border2:     #252a42;
      --accent:      #d4a94a;
      --accent-dim:  #7a6128;
      --accent-glow: rgba(212,169,74,0.18);
      --text:        #6a748a;
      --text-mid:    #96a0bc;
      --text-bright: #c8d2ec;
      --green:       #4be890;
      --red:         #e84b5a;
    }

    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px 12px;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      flex-shrink: 0;
    }
    #title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-bright);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #title span { color: var(--accent); }
    #meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 10px;
      color: var(--text);
      letter-spacing: 0.1em;
    }
    #status {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--accent);
      transition: color 0.3s;
    }
    #status.ready { color: var(--green); }
    #status.error { color: var(--red); }

    /* ── Plot ── */
    #plot-wrap {
      flex: 1;
      position: relative;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      background: var(--surface);
    }
    #plot { width: 100%; height: 100%; }

    /* corner decorations */
    #plot-wrap::before, #plot-wrap::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent-dim);
      border-style: solid;
      z-index: 5;
      pointer-events: none;
    }
    #plot-wrap::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    #plot-wrap::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      z-index: 20;
      gap: 18px;
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 44px; height: 44px;
      border: 1px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-msg  { font-size: 11px; color: var(--text-mid); letter-spacing: 0.15em; }
    #loading-step { font-size: 10px; color: var(--accent-dim); letter-spacing: 0.1em; font-style: italic; }

    /* ── Controls ── */
    #controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 12px 18px 10px;
      flex-shrink: 0;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .lbl {
      font-size: 9px;
      color: var(--text);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .readout {
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      min-width: 56px;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .readout-sm {
      font-size: 13px;
      color: var(--text-mid);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    #week-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 1px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
    }
    #week-slider:disabled { cursor: not-allowed; opacity: 0.4; }
    #week-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 2px var(--bg), 0 0 10px var(--accent-glow);
      transition: box-shadow 0.2s;
    }
    #week-slider:not(:disabled)::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 2px var(--bg), 0 0 16px var(--accent);
    }
    #week-slider::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .tick-row {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
      padding: 0 1px;
    }
    .tick { font-size: 9px; color: var(--accent-dim); letter-spacing: 0.06em; }

    /* ── Legend ── */
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid var(--border);
    }
    .legend-lbl { font-size: 9px; color: var(--text); letter-spacing: 0.1em; white-space: nowrap; }
    .legend-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, rgb(255,0,0), rgb(255,255,255), rgb(0,0,128));
      opacity: 0.7;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="title">Occupational <span>Stress</span> Sphere</div>
    <div id="meta">
      <span>60 CATEGORIES · 520 WEEKS · 10 YEARS</span>
      <span id="status">◈ INITIALIZING</span>
    </div>
  </div>

  <div id="plot-wrap">
    <div id="plot"></div>
    <div id="loading-overlay">
      <div class="loader-ring"></div>
      <div id="loading-msg">LOADING PYODIDE</div>
      <div id="loading-step">fetching wasm runtime...</div>
    </div>
  </div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="lbl">WK</span>
      <span class="readout" id="week-disp">000</span>
      <input type="range" id="week-slider" min="0" max="519" value="0" step="1" disabled>
      <span class="readout-sm" id="year-disp">YR 0.0</span>
      <span class="lbl" id="render-ms"></span>
    </div>
    <div class="tick-row">
      <span class="tick">Y0</span><span class="tick">Y1</span><span class="tick">Y2</span>
      <span class="tick">Y3</span><span class="tick">Y4</span><span class="tick">Y5</span>
      <span class="tick">Y6</span><span class="tick">Y7</span><span class="tick">Y8</span>
      <span class="tick">Y9</span><span class="tick">Y10</span>
    </div>
    <div class="legend-row">
      <span class="legend-lbl">HIGH STRESS</span>
      <div class="legend-bar"></div>
      <span class="legend-lbl">LOW STRESS</span>
    </div>
  </div>

</div>

<!-- ═══════════════════ PYTHON ═══════════════════ -->
<script type="text/x-python" id="pycode">
import numpy as np
import json
from scipy.spatial import Delaunay
from scipy.spatial.distance import cdist

# ── Pre-computed geometry globals ──────────────────────────
_PHI          = (1.0 + np.sqrt(5.0)) / 2.0
_base_verts   = None   # (60, 3)  golden-spiral anchor points
_sphere_pts   = None   # (N, 3)   high-res unit-sphere surface
_k_near       = None   # (N, 5)   indices of 5 nearest anchors per surface pt
_w_raw        = None   # (N, 5)   raw inverse-distance weights (un-normalised)
_simplices    = None   # (T, 3)   Delaunay simplex indices (pre-computed on unit sphere)
_ts           = None   # (520,60) weekly stress time-series

CATS = [
    'Workload','Work Hours','Physical Safety','Ergonomics','Fatigue',
    'Sleep Quality','Nutrition Access','Hydration','Rest Breaks','Physical Strain',
    'Job Security','Income Stability','Benefits','Retirement','Health Insurance',
    'Workplace Violence','Harassment','Discrimination','Legal Protection','Contract Clarity',
    'Team Cohesion','Peer Support','Manager Support','Social Isolation','Work-Life Balance',
    'Family Time','Friendships','Community','Mentorship','Collaboration',
    'Recognition','Respect','Autonomy','Authority','Competence',
    'Achievement','Status','Reputation','Performance Feedback','Promotion Opportunity',
    'Purpose','Meaning','Creativity','Innovation','Learning',
    'Skill Development','Challenge','Growth','Mastery','Legacy',
    'Time Pressure','Deadlines','Interruptions','Multitasking','Technology Issues',
    'Communication','Role Clarity','Resources','Training','Equipment Quality'
]

# ── Vectorised navy-white-red colour mapping ───────────────
def _vcol(vals):
    v = np.clip(np.asarray(vals, float), 0.0, 1.0)
    n = len(v)
    r = np.empty(n, np.int32)
    g = np.empty(n, np.int32)
    b = np.empty(n, np.int32)

    hi = v >= 0.5
    lo = ~hi
    th = (v[hi] - 0.5) / 0.5   # 0→mid, 1→top
    tl = v[lo] / 0.5            # 0→bottom, 1→mid

    # high half: white → navy
    r[hi] = ((1 - th) * 255).astype(np.int32)
    g[hi] = ((1 - th) * 255).astype(np.int32)
    b[hi] = ((1 - th) * 255 + th * 128).astype(np.int32)

    # low half: red → white
    r[lo] = 255
    g[lo] = (tl * 255).astype(np.int32)
    b[lo] = (tl * 255).astype(np.int32)

    return [f'rgb({r[i]},{g[i]},{b[i]})' for i in range(n)]

# ── Initialisation (called once) ──────────────────────────
def initialize():
    global _base_verts, _sphere_pts, _k_near, _w_raw, _simplices, _ts

    # 60 golden-spiral vertices on the unit sphere
    verts = []
    for i in range(60):
        y = 1.0 - (i / 59.0) * 2.0
        r = np.sqrt(max(0.0, 1.0 - y * y))
        t = _PHI * i * 2 * np.pi
        verts.append([np.cos(t) * r, y, np.sin(t) * r])
    _base_verts = np.array(verts)

    # High-res sphere surface (≈2,400 pts)
    pts = []
    for i in range(80):
        y = 1.0 - (i / 79.0) * 2.0
        r = np.sqrt(max(0.0, 1.0 - y * y))
        nc = max(8, int(40 * r))
        for j in range(nc):
            t = (j / nc) * 2 * np.pi
            pts.append([np.cos(t) * r, y, np.sin(t) * r])
    _sphere_pts = np.array(pts)

    # k-nearest anchors + inverse-distance weights (cached)
    dists  = cdist(_sphere_pts, _base_verts)
    k = 5
    _k_near = np.argsort(dists, axis=1)[:, :k]
    nd = dists[np.arange(len(_sphere_pts))[:, None], _k_near]
    _w_raw  = 1.0 / (nd + 0.1)

    # Delaunay triangulation on unit sphere (spherical coords, topology fixed)
    norms = np.linalg.norm(_sphere_pts, axis=1, keepdims=True)
    pn = _sphere_pts / np.maximum(norms, 1e-10)
    sph = np.column_stack([
        np.arctan2(pn[:, 1], pn[:, 0]),
        np.arccos(np.clip(pn[:, 2], -1.0, 1.0))
    ])
    _simplices = Delaunay(sph).simplices

    # Generate 520-week synthetic time-series
    np.random.seed(42)
    wk = np.arange(520)
    D  = np.zeros((520, 60))
    for i in range(60):
        bl = np.random.uniform(-0.5, 1.5)
        ts = np.random.uniform(-0.0002, 0.0002)
        sa = np.random.uniform(0.05, 0.15)
        sp = np.random.uniform(0, 2 * np.pi)
        D[:, i] = bl + ts*wk + sa*np.sin(2*np.pi*wk/52 + sp) + np.random.normal(0, 0.05, 520)
    D = np.clip(D, 0.2, 1.0)
    D[104:130, [10, 11, 12]] -= 0.15
    D[208:260, [20, 21, 22]] += 0.12
    D[305:315, [0, 50, 51]]  -= 0.20
    D[364:,    [4,  5,  8]]  += 0.10
    _ts = np.clip(D, 0.2, 1.0)
    return "OK"

# ── Per-frame trace generation ─────────────────────────────
def get_traces(week_idx):
    week_idx = int(week_idx)
    raw  = _ts[week_idx]
    data = raw / max(raw.max(), 1.0)   # normalise to [0,1]

    indent = 0.3 + data * 0.7         # [0.3, 1.0] – how far each anchor is pulled in
    pos    = _base_verts * indent[:, None]   # (60,3) actual anchor positions

    # Weighted interpolation → per-surface-point indent & data value
    w    = _w_raw / _w_raw.sum(axis=1, keepdims=True)            # (N,5) normalised
    wi   = np.sum(indent[_k_near] * w, axis=1)                   # (N,)
    dsp  = _sphere_pts * wi[:, None]                              # (N,3) deformed pts
    spv  = np.sum(data[_k_near] * w, axis=1)                     # (N,) data per surface pt

    traces = []

    # Reference wireframe shells
    for radius, alpha in [(1.0, 0.10), (0.75, 0.07), (0.55, 0.06), (0.35, 0.05)]:
        for ip in range(5):
            pv = (ip / 5) * np.pi
            sp = np.sin(pv); cp = np.cos(pv)
            t  = np.linspace(0, 2 * np.pi, 36)
            traces.append({
                'type': 'scatter3d',
                'x': (radius * np.cos(t) * sp).tolist(),
                'y': (radius * np.sin(t) * sp).tolist(),
                'z': (radius * cp * np.ones(36)).tolist(),
                'mode': 'lines',
                'line': {'color': f'rgba(130,145,190,{alpha})', 'width': 1},
                'showlegend': False, 'hoverinfo': 'skip'
            })

    # Direction spokes + category labels (every 3rd category = 20 spokes)
    spoke_colors = _vcol(data[::3])
    for ii, i in enumerate(range(0, 60, 3)):
        d = _base_verts[i]
        p = pos[i]
        c = spoke_colors[ii]
        traces.append({
            'type': 'scatter3d',
            'x': [float(d[0]), float(p[0])],
            'y': [float(d[1]), float(p[1])],
            'z': [float(d[2]), float(p[2])],
            'mode': 'lines',
            'line': {'color': c, 'width': 2},
            'opacity': 0.75,
            'showlegend': False, 'hoverinfo': 'skip'
        })
        lp = d * 1.30
        traces.append({
            'type': 'scatter3d',
            'x': [float(lp[0])], 'y': [float(lp[1])], 'z': [float(lp[2])],
            'mode': 'text',
            'text': [CATS[i]],
            'textfont': {'size': 7, 'color': c},
            'showlegend': False, 'hoverinfo': 'skip'
        })

    # Deformed mesh3d
    tri_vals   = spv[_simplices].mean(axis=1)
    face_colors = _vcol(tri_vals)
    traces.append({
        'type': 'mesh3d',
        'x': dsp[:, 0].tolist(),
        'y': dsp[:, 1].tolist(),
        'z': dsp[:, 2].tolist(),
        'i': _simplices[:, 0].tolist(),
        'j': _simplices[:, 1].tolist(),
        'k': _simplices[:, 2].tolist(),
        'facecolor': face_colors,
        'opacity': 0.72,
        'showlegend': False,
        'hoverinfo': 'skip',
        'lighting': {
            'ambient': 0.55, 'diffuse': 0.85,
            'specular': 0.25, 'roughness': 0.6, 'fresnel': 0.2
        },
        'lightposition': {'x': 200, 'y': 300, 'z': 200}
    })

    return json.dumps(traces)
</script>

<!-- ═══════════════════ JAVASCRIPT ═══════════════════ -->
<script>
  const plotEl   = document.getElementById('plot');
  const slider   = document.getElementById('week-slider');
  const weekDisp = document.getElementById('week-disp');
  const yearDisp = document.getElementById('year-disp');
  const statusEl = document.getElementById('status');
  const loadOv   = document.getElementById('loading-overlay');
  const loadMsg  = document.getElementById('loading-msg');
  const loadStep = document.getElementById('loading-step');
  const renderMs = document.getElementById('render-ms');

  const LAYOUT = {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor:  'rgba(0,0,0,0)',
    margin: { l: 0, r: 0, b: 0, t: 0 },
    scene: {
      bgcolor: 'rgba(0,0,0,0)',
      xaxis: { visible: false, range: [-1.6, 1.6] },
      yaxis: { visible: false, range: [-1.6, 1.6] },
      zaxis: { visible: false, range: [-1.6, 1.6] },
      aspectmode: 'cube',
      camera: { eye: { x: 1.55, y: 1.55, z: 1.15 } }
    },
    uirevision: 'constant'   // preserves camera between data updates
  };

  const CONFIG = { displayModeBar: false, responsive: true };

  let pyodide  = null;
  let busy     = false;
  let pending  = null;

  const setStatus = (msg, cls = '') => {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  };

  const updateReadouts = (week) => {
    weekDisp.textContent = String(week).padStart(3, '0');
    yearDisp.textContent = `YR ${(week / 52).toFixed(1)}`;
  };

  async function renderWeek(week) {
    if (busy) { pending = week; return; }
    busy = true;
    try {
      const t0        = performance.now();
      const tracesJson = pyodide.runPython(`get_traces(${week})`);
      const traces    = JSON.parse(tracesJson);
      const dt1       = performance.now();
      await Plotly.react(plotEl, traces, LAYOUT, CONFIG);
      const ms        = Math.round(performance.now() - t0);
      renderMs.textContent = `${ms}ms`;
      setStatus(`◈ W${String(week).padStart(3,'0')} · LIVE`, 'ready');
    } catch (e) {
      setStatus('◈ RENDER ERROR', 'error');
      console.error(e);
    } finally {
      busy = false;
      if (pending !== null && pending !== week) {
        const next = pending; pending = null; renderWeek(next);
      }
    }
  }

  async function init() {
    try {
      loadMsg.textContent  = 'LOADING PYODIDE';
      loadStep.textContent = 'fetching wasm runtime (~8mb)...';
      setStatus('◈ LOADING WASM');

      pyodide = await loadPyodide();

      loadMsg.textContent  = 'INSTALLING PACKAGES';
      loadStep.textContent = 'numpy · scipy · json...';
      setStatus('◈ INSTALLING PKG');

      const pyCode = document.getElementById('pycode').textContent;
      await pyodide.loadPackagesFromImports(pyCode);

      loadMsg.textContent  = 'BUILDING GEOMETRY';
      loadStep.textContent = 'golden spiral · delaunay triangulation...';
      setStatus('◈ COMPUTING GEO');

      pyodide.runPython(pyCode);
      pyodide.runPython('initialize()');

      loadMsg.textContent  = 'RENDERING WEEK 0';
      loadStep.textContent = 'first frame takes a moment...';
      setStatus('◈ FIRST RENDER');

      const tracesJson = pyodide.runPython('get_traces(0)');
      await Plotly.newPlot(plotEl, JSON.parse(tracesJson), LAYOUT, CONFIG);

      loadOv.classList.add('hidden');
      slider.disabled = false;
      setStatus('◈ W000 · READY', 'ready');

    } catch (e) {
      loadMsg.textContent  = 'INIT FAILED';
      loadStep.textContent = e.message;
      setStatus('◈ ERROR', 'error');
      console.error(e);
    }
  }

  slider.addEventListener('input', (e) => {
    const w = parseInt(e.target.value);
    updateReadouts(w);
    renderWeek(w);
  });

  init();
</script>
</body>
